<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product — Lunastitch</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
<style>
.product-layout  { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 64px); }
.product-visual  { background: var(--cream2); display: flex; align-items: center; justify-content: center; position: sticky; top: 64px; height: calc(100vh - 64px); }
.product-visual img { max-width: 90%; max-height: 80%; object-fit: contain; }
.product-detail  { padding: 56px 48px; }
.edition-tabs { display: flex; margin-bottom: 24px; }
.etab { flex: 1; padding: 11px; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; border: .5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .2s; }
.etab.active { background: var(--ink2); color: var(--cream); border-color: var(--ink2); }
.features-list { list-style: none; margin-bottom: 28px; }
.features-list li { font-size: 13px; color: var(--muted); padding: 7px 0; border-bottom: .5px solid var(--border2); display: flex; gap: 10px; align-items: baseline; }
.features-list li::before { content: '◈'; color: var(--gold-l); font-size: 9px; flex-shrink: 0; }
@media(max-width:800px) {
  .product-layout { grid-template-columns: 1fr; }
  .product-visual { position: static; height: 300px; }
  .product-detail { padding: 32px 22px; }
}
</style>
</head>
<body>

<div class="mobile-menu" id="mobileMenu">
  <button class="m-close" onclick="closeMobile()">✕</button>
  <a href="/" onclick="closeMobile()">Home</a>
  <a href="/#collections" onclick="closeMobile()">Collections</a>
  <a href="/about.html" onclick="closeMobile()">About</a>
  <a href="/#pricing" onclick="closeMobile()">Pricing</a>
  <div style="width:32px;height:.5px;background:var(--border)"></div>
  <div id="mobile-auth-links"></div>
</div>
<nav class="site-nav" id="navbar">
  <a href="/" class="logo-mark">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#9A7D52" stroke-width=".8"/>
      <path d="M9 19 Q14 8 19 19" stroke="#9A7D52" stroke-width="1" fill="none" stroke-linecap="round"/>
      <circle cx="14" cy="13" r="1.5" fill="#9A7D52"/>
    </svg>
    <span class="logo-text">LUNASTITCH</span>
  </a>
  <div class="nav-links">
    <a href="/#collections">Collections</a>
    <a href="/about.html">About</a>
    <span id="nav-auth"></span>
  </div>
  <button class="hamburger" onclick="openMobile()"><span></span><span></span><span></span></button>
</nav>

<div class="page-wrap">
  <div class="product-layout">
    <div class="product-visual">
      <img id="product-hero" src="" alt="" style="display:none">
      <div id="product-hero-placeholder" style="text-align:center;color:var(--muted);font-size:12px">
        Product image<br>loads here<br><br>
        <span style="font-size:10px;color:var(--gold-l)">Replace with real photo at launch</span>
      </div>
    </div>
    <div class="product-detail">
      <div style="font-size:11px;color:var(--muted);margin-bottom:20px"><a href="/" style="color:var(--muted)">Home</a><span style="margin:0 6px">›</span><a href="/#collections" style="color:var(--muted)">Collections</a><span style="margin:0 6px">›</span><span id="breadcrumb-name" style="color:var(--ink2)">—</span></div>
      <div style="font-size:10px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:10px">Collection</div>
      <h1 id="product-name"    style="font-size:34px;margin-bottom:10px">Loading…</h1>
      <p  id="product-tagline" style="font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:32px"></p>
      <div style="font-size:10px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;margin-bottom:10px">Choose edition</div>
      <div class="edition-tabs" id="edition-tabs"></div>
      <div id="edition-price"
        style="font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;color:var(--gold);margin:16px 0 20px"></div>
      <ul class="features-list" id="edition-features"></ul>
      <button class="btn-dark" style="width:100%;margin-bottom:12px" onclick="startOrder()">
        Request this piece
      </button>
      <p style="font-size:11px;color:var(--muted);text-align:center">
        You'll upload your photo and confirm details in the next steps.
      </p>
      <div id="product-alert" style="margin-top:16px"></div>
    </div>
  </div>
</div>

<script>
window.addEventListener('scroll', () =>
  document.getElementById('navbar').classList.toggle('scrolled', scrollY > 40));
function openMobile()  { document.getElementById('mobileMenu').classList.add('open');    document.body.style.overflow='hidden'; }
function closeMobile() { document.getElementById('mobileMenu').classList.remove('open'); document.body.style.overflow=''; }
</script>
<script type="module" src="/js/product.js"></script>
</body>
</html>
