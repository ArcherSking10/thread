<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Lunastitch</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
<style>
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cream2); padding: 24px; }
.login-card { background: var(--cream); border: .5px solid var(--border); padding: 48px 40px; width: 100%; max-width: 400px; }
.login-logo { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 22px; letter-spacing: .2em; margin-bottom: 16px; text-align: center; color: var(--ink2); }
.ltabs { display: flex; border-bottom: .5px solid var(--border); margin-bottom: 28px; }
.ltab  { flex: 1; padding: 10px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; background: none; border: none; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s; }
.ltab.active { color: var(--gold); border-bottom-color: var(--gold); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">LUNASTITCH</div>
    <div style="text-align:center;margin-bottom:24px">
      <a href="/" style="font-size:11px;color:var(--muted);letter-spacing:.12em">← Back to site</a>
    </div>
    <div id="dev-banner" style="display:none" class="alert alert-info">
      <strong>Local dev mode</strong><br>
      Supabase is not configured. Login is unavailable.<br>
      Fill in <code>js/config.js</code> to enable.<br><br>
      <a href="/" style="color:var(--gold)">← Back to site</a>
    </div>
    <div id="login-content">
      <div class="ltabs">
        <button class="ltab active" onclick="switchTab('login',  this)">Sign in</button>
        <button class="ltab"        onclick="switchTab('signup', this)">Create account</button>
      </div>
      <div id="alert-box"></div>
      <div id="panel-login">
        <form onsubmit="handleLogin(event)">
          <div class="f-group">
            <label class="f-label">Email</label>
            <input class="f-input" type="email" id="login-email" required placeholder="jane@example.com">
          </div>
          <div class="f-group">
            <label class="f-label">Password</label>
            <input class="f-input" type="password" id="login-pass" required placeholder="Your password">
          </div>
          <div style="text-align:right;margin-bottom:12px">
            <a href="#" onclick="handleForgot(event)" style="font-size:11px;color:var(--muted)">Forgot password?</a>
          </div>
          <button class="btn-dark" type="submit" style="width:100%;margin-top:8px">Sign in</button>
        </form>
      </div>
      <div id="panel-signup" style="display:none">
        <form onsubmit="handleSignup(event)">
          <div class="f-group">
            <label class="f-label">Full name</label>
            <input class="f-input" type="text" id="signup-name" required placeholder="Jane Smith">
          </div>
          <div class="f-group">
            <label class="f-label">Email</label>
            <input class="f-input" type="email" id="signup-email" required placeholder="jane@example.com">
          </div>
          <div class="f-group">
            <label class="f-label">Password</label>
            <input class="f-input" type="password" id="signup-pass" required placeholder="Min 8 characters" minlength="8">
          </div>
          <button class="btn-dark" type="submit" style="width:100%;margin-top:8px">Create account</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { login, signUp, getSession, resetPassword } from '/js/auth.js';
  import { isConfigured } from '/js/config.js';

  if (!isConfigured()) {
    document.getElementById('dev-banner').style.display = 'block';
    document.getElementById('login-content').style.display = 'none';
  } else {
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/account.html';
    getSession().then(s => { if (s) location.href = next; });
  }

  function showAlert(msg, type = 'error') {
    document.getElementById('alert-box').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }

  window.switchTab = (tab, el) => {
    document.getElementById('alert-box').innerHTML = '';
    document.querySelectorAll('.ltab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-login' ).style.display = tab === 'login'  ? 'block' : 'none';
    document.getElementById('panel-signup').style.display = tab === 'signup' ? 'block' : 'none';
  };

  window.handleLogin = async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const params = new URLSearchParams(location.search);
      const next = params.get('next') || '/account.html';
      await login(
        document.getElementById('login-email').value,
        document.getElementById('login-pass').value
      );
      location.href = next;
    } catch (err) {
      btn.disabled = false; btn.textContent = 'Sign in';
      showAlert(err.message);
    }
  };

  window.handleSignup = async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      await signUp(
        document.getElementById('signup-email').value,
        document.getElementById('signup-pass').value,
        document.getElementById('signup-name').value
      );
      document.getElementById('panel-signup').innerHTML = `
        <div class="alert alert-success" style="margin-bottom:0">
          <strong>Check your inbox</strong><br>
          We sent a verification link to your email. Click it to activate
          your account, then come back to sign in.
        </div>`;
      document.querySelectorAll('.ltab').forEach((t, i) =>
        t.classList.toggle('active', i === 0));
    } catch (err) {
      btn.disabled = false; btn.textContent = 'Create account';
      showAlert(err.message);
    }
  };

  window.handleForgot = async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showAlert('Enter your email above first.'); return; }
    try {
      await resetPassword(email);
      showAlert('Password reset email sent. Check your inbox.', 'success');
    } catch (err) { showAlert(err.message); }
  };
</script>
</body>
</html>
