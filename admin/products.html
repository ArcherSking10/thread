<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products — Lunastitch Admin</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
</head>
<body data-page="products">

<nav class="site-nav">
  <a href="/" class="logo-mark"><span class="logo-text">LUNASTITCH</span></a>
  <span style="font-size:10px;color:var(--gold);letter-spacing:.2em">ADMIN</span>
  <button class="btn-ghost btn-sm" onclick="logout()">Sign out</button>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="/admin/">Dashboard</a>
    <a href="/admin/orders.html">Orders</a>
    <a href="/admin/products.html" class="active">Products</a>
    <a href="/" target="_blank">View site ↗</a>
  </aside>
  <main class="admin-main">
    <div class="admin-title">Products</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:28px;line-height:1.8">
      在这里修改产品文案、图片和价格。Stripe Price ID 必须与 Stripe Dashboard 中的产品一致。<br>
      本地调试时编辑操作会输出到控制台（Console）而不会真实保存。
    </p>
    <div id="products-editor"><div class="spinner"></div></div>
  </main>
</div>

<script type="module">
  import { logout } from '/js/auth.js';
  window.logout = logout;
</script>
<script type="module" src="/js/admin.js"></script>
</body>
</html>
