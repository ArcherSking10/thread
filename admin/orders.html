<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders — Lunastitch Admin</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
<style>
.status-drop { position:relative; display:inline-block; cursor:pointer; user-select:none; }
.status-drop .badge { cursor:pointer; }
.status-drop .badge:hover { opacity:.85; }
.status-menu {
  display:none; position:fixed; z-index:1000;
  background:var(--cream); border:.5px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.08); min-width:180px; padding:4px 0;
}
.status-drop.open .status-menu { display:block; }
.status-opt {
  padding:8px 14px; font-size:11px; letter-spacing:.08em; color:var(--ink2);
  cursor:pointer; text-transform:uppercase;
}
.status-opt:hover { background:var(--cream2); }
.status-opt.active { color:var(--gold); }

/* Filter dropdown */
.filter-drop { position:relative; display:inline-block; }
.filter-btn {
  font-family:inherit; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--ink2); background:var(--cream); border:.5px solid var(--border);
  padding:8px 16px; cursor:pointer; display:flex; align-items:center;
}
.filter-btn:hover { background:var(--cream2); }
.filter-menu {
  display:none; position:absolute; top:calc(100% + 4px); right:0; z-index:1000;
  background:var(--cream); border:.5px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.08); min-width:200px; padding:4px 0;
}
.filter-drop.open .filter-menu { display:block; }
.filter-opt {
  padding:8px 16px; font-size:11px; letter-spacing:.08em; color:var(--ink2);
  cursor:pointer; text-transform:uppercase;
}
.filter-opt:hover { background:var(--cream2); }
.filter-opt.active { color:var(--gold); }
</style>
</head>
<body data-page="orders">

<nav class="site-nav">
  <a href="/" class="logo-mark"><span class="logo-text">LUNASTITCH</span></a>
  <a href="#" onclick="logout()" class="nav-signout">Sign out</a>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="/admin/">Dashboard</a>
    <a href="/admin/orders.html" class="active">Orders</a>
    <a href="/admin/products.html">Products</a>
    <a href="/admin/content.html">Content</a>
    <a href="/" target="_blank">View site ↗</a>
  </aside>
  <main class="admin-main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div class="admin-title" style="margin-bottom:0">Orders</div>
      <div class="filter-drop" id="filter-drop">
        <button class="filter-btn" id="filter-btn" onclick="toggleFilter(event)">
          <span id="filter-label">All statuses</span>
          <span style="margin-left:8px;font-size:10px">&#9662;</span>
        </button>
        <div class="filter-menu" id="filter-menu">
          <div class="filter-opt active" data-val="" onclick="selectFilter(this,'All statuses')">All statuses</div>
          <div class="filter-opt" data-val="pending"            onclick="selectFilter(this,'Awaiting payment')">Awaiting payment</div>
          <div class="filter-opt" data-val="paid"              onclick="selectFilter(this,'Order confirmed')">Order confirmed</div>
          <div class="filter-opt" data-val="in_production"     onclick="selectFilter(this,'In production')">In production</div>
          <div class="filter-opt" data-val="preview_sent"      onclick="selectFilter(this,'Preview ready')">Preview ready</div>
          <div class="filter-opt" data-val="revision_requested" onclick="selectFilter(this,'Revision requested')">Revision requested</div>
          <div class="filter-opt" data-val="preview_approved"  onclick="selectFilter(this,'Preview approved')">Preview approved</div>
          <div class="filter-opt" data-val="shipped"           onclick="selectFilter(this,'Shipped')">Shipped</div>
          <div class="filter-opt" data-val="complete"          onclick="selectFilter(this,'Complete')">Complete</div>
        </div>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="tbl">
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Date</th>
            <th>Status</th>
            <th>Photo</th>
            <th>Preview</th>
            <th>Admin note</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr>
            <td colspan="8" style="text-align:center;padding:32px">
              <div class="spinner"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script type="module">
  import { logout } from '/js/auth.js';
  import { isConfigured } from '/js/config.js';
  window.logout = logout;

  if (!isConfigured()) {
    document.getElementById('orders-tbody').innerHTML =
      `<tr><td colspan="8" style="padding:32px">
        <div class="alert alert-info">Configure Supabase in js/config.js to view orders.</div>
      </td></tr>`;
    document.getElementById('filter-btn').disabled = true; document.getElementById('filter-btn').style.opacity = '.5';
  } else {
    import('/js/admin.js');
  }
</script>
<script>
function toggleFilter(e) {
  if (e) e.stopPropagation();
  document.getElementById('filter-drop').classList.toggle('open');
}

function selectFilter(el, label) {
  document.getElementById('filter-label').textContent = label;
  document.querySelectorAll('.filter-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('filter-drop').classList.remove('open');
  const val = el.dataset.val;
  if (typeof window.loadOrders === 'function') window.loadOrders(val || undefined);
}

// Track open drop to match fixed-position menu clicks
let _openDrop = null;

document.addEventListener('click', e => {
  // Click on a status-opt (fixed position, outside DOM parent visually)
  const opt = e.target.closest('.status-opt');
  if (opt) {
    const id  = opt.dataset.id;
    const val = opt.dataset.val;
    if (id && val && typeof window.changeStatus === 'function') {
      window.changeStatus(id, val);
    }
    if (_openDrop) { _openDrop.classList.remove('open'); _openDrop = null; }
    return;
  }

  // Click on filter-opt
  const fopt = e.target.closest('.filter-opt');
  if (fopt) return; // handled by onclick attribute

  // Click on status-drop: toggle
  const drop = e.target.closest('.status-drop');
  if (drop) {
    const wasOpen = drop === _openDrop;
    if (_openDrop) { _openDrop.classList.remove('open'); _openDrop = null; }
    if (!wasOpen) {
      drop.classList.add('open');
      _openDrop = drop;
      // Position menu below badge
      const badge = drop.querySelector('.badge');
      const rect  = badge.getBoundingClientRect();
      const menu  = drop.querySelector('.status-menu');
      menu.style.top  = (rect.bottom + 4) + 'px';
      menu.style.left = rect.left + 'px';
    }
    return;
  }

  // Click elsewhere: close all
  if (_openDrop) { _openDrop.classList.remove('open'); _openDrop = null; }
  document.getElementById('filter-drop')?.classList.remove('open');
});
</script>
</body>
</html>
